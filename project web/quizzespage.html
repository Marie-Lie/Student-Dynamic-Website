	<main>
	<script>
        // Menu functionality
		//grab elements from HTML
        const menuToggle = document.querySelector('.menu-toggle');
        const sideMenu = document.querySelector('.side-menu');
        const menuOverlay = document.querySelector('.menu-overlay');
        const menuClose = document.querySelector('.menu-close');

		//add css active class
        function openMenu() {
            sideMenu.classList.add('active');
            menuOverlay.classList.add('active');
            menuToggle.style.display = 'none';
        }

		//add css active class
        function closeMenu() {
            sideMenu.classList.remove('active');
            menuOverlay.classList.remove('active');
            menuToggle.style.display = 'flex';
        }
		
        menuToggle.addEventListener('click', openMenu); //on click open menu
        menuClose.addEventListener('click', closeMenu); //on click close menu
        menuOverlay.addEventListener('click', closeMenu); //darken the background, prevent interation under it

        // Close menu when clicking a menu item
        document.querySelectorAll('.menu-item a').forEach(item => {
            item.addEventListener('click', closeMenu);
        });

    </script>
